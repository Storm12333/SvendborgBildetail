<!DOCTYPE html>
<html lang="da">
<head>
  <link rel="icon" href="Billeder/cirkellogo123.png" type="image/x-icon">

  <meta charset="UTF-8">
  <title>Kontakt os for professionel bil rengøring | Svendborg Bildetail</title>
  <style>
   body{
margin:0;
font-family:system-ui,-apple-system,sans-serif;
background:linear-gradient(180deg,#0a0a0a 0%,#111 40%,#0a0a0a 100%);
color:#fff;
line-height:1.6;
}

/* HEADER */

header{
position:relative;
width:100%;
z-index:10;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(8px);
border-bottom:1px solid #222;
padding:20px 50px;
display:flex;
flex-direction:column;
align-items:center;
}

.header-content{
width:100%;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.logo{
height:110px;
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%);
}

.header-text{
text-align:center;
}

.header-text h1{
margin:0;
font-size:2.2em;
color:#e6f0ff;
}

.header-text p{
margin:0;
font-size:1.2em;
color:#ccc;
}

nav{
margin-top:10px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
position:relative;
}

nav a::after{
content:"";
position:absolute;
bottom:-4px;
left:0;
width:0%;
height:2px;
background:#7fa8ff;
transition:width .3s;
}

nav a:hover::after{
width:100%;
}

/* MAIN */

main{
padding:60px 20px 120px;
max-width:900px;
margin:auto;
text-align:center;
}

main h1{
font-size:2rem;
color:#e6f0ff;
}

/* KONTAKT */

.Kontakter{
font-size:1.2rem;
margin-top:30px;
}

.mailknap{
display:inline-block;
padding:18px 40px;
border:1px solid #fff;
color:#fff;
text-decoration:none;
font-weight:600;
letter-spacing:1px;
transition:all .25s;
margin-top:30px;
}

.mailknap:hover{
background:#fff;
color:#000;
transform:translateY(-4px);
}

/* FOOTER */

footer{
border-top:1px solid #222;
text-align:center;
padding:40px 20px;
font-size:.9em;
color:#aaa;
background:#111;
}

/* MOBILE */

@media(max-width:768px){

.logo{
position:static;
height:70px;
transform:none;
margin-bottom:10px;
}

.header-text h1{
font-size:1.6em;
}

nav{
display:none;
}

main h1{
font-size:1.5rem;
}

}


  </style>
</head>
<body>
<header>
  <div class="header-content">
    <a href="index.html">
      <img src="Billeder/svbbd_hvidtlogo.png" alt="Svendborg Bildetailing Logo" class="logo">
    </a>

    <div class="header-text">
      <h1>Svendborg Bildetail</h1>
      <p>Vi giver din bil nyt liv!</p>
    </div>
  </div>

  <nav>
    <a href="services.html">Services</a>
    <a href="omos.html">Om os</a>
    <a href="kontakt.html">Kontakt</a>
    <a href="privacy.html">Privacy</a>
  </nav>
</header>

  <main>
    <h1>
       Kontakt os for bilrengøring i Svendborg – book tid hos Svendborg Bildetail
    </h1>
    <div class="Kontakter" style="padding-top: 45px;">
    <h2>Telefon: +45 29 72 96 95</p>
    <p>Mail: svendborgbildetail@gmail.com</p>
    </div>
    <div class="knapcontainer">
      <a href="mailto:svendborgbildetail@gmail.com" class="mailknap">Send os en mail nu, og book en tid</a>
      </div>
  </main>

  <footer>
    <p>&copy; 2026 Svendborg Bildetail</p>
  </footer>
</body>
</html>
